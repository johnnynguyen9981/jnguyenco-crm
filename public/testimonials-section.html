<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Testimonials — JNguyen Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:  #083a4f;
    --sand:  #a58d66;
    --teal:  #407e8c;
    --pale:  #c0d5d6;
    --cream: #f7f4f1;
    --dark:  #071e28;
    --mid:   #5a7a85;
    --gray:  #6b7280;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--navy); }

  /* ── Section ────────────────────────────────────────── */
  .t-section { padding: 88px 24px 100px; max-width: 1100px; margin: 0 auto; }

  /* ── Header ─────────────────────────────────────────── */
  .t-header { text-align: center; margin-bottom: 56px; }
  .t-eyebrow {
    font-size: 10px; font-weight: 600; letter-spacing: 3.5px;
    text-transform: uppercase; color: var(--sand); margin-bottom: 16px;
  }
  .t-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(38px, 6vw, 62px); font-weight: 300;
    color: var(--navy); line-height: 1.1; letter-spacing: -.5px;
  }
  .t-title em { font-style: italic; color: var(--teal); }

  /* ── Rating summary bar ─────────────────────────────── */
  .t-rating-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-top: 28px; flex-wrap: wrap;
  }
  .t-stars { display: flex; gap: 4px; }
  .t-star { font-size: 20px; color: var(--sand); }
  .t-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; font-weight: 300; color: var(--navy); line-height: 1;
  }
  .t-count { font-size: 13px; color: var(--gray); font-weight: 300; }
  .t-google-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border: 1px solid rgba(8,58,79,.12);
    border-radius: 40px; font-size: 12px; color: var(--mid);
  }
  .t-google-badge svg { width: 16px; height: 16px; }
  .t-rule { width: 40px; height: 1.5px; background: var(--sand); margin: 28px auto 0; }

  /* ── Loading / error ─────────────────────────────────── */
  .t-loading {
    text-align: center; padding: 40px;
    color: var(--mid); font-size: 13px; font-weight: 300;
  }
  .t-spinner {
    width: 28px; height: 28px; border: 2px solid var(--pale);
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Cards grid ─────────────────────────────────────── */
  .t-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 48px;
  }

  /* ── Review card ─────────────────────────────────────── */
  .t-card {
    background: #fff;
    border-radius: 14px;
    padding: 28px;
    border: 1px solid rgba(8,58,79,.07);
    box-shadow: 0 2px 16px rgba(8,58,79,.05);
    display: flex; flex-direction: column; gap: 16px;
    transition: transform .25s, box-shadow .25s;
    opacity: 0; transform: translateY(20px);
    animation: cardIn .5s forwards;
  }
  .t-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(8,58,79,.1);
  }
  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .t-card:nth-child(1) { animation-delay: .05s; }
  .t-card:nth-child(2) { animation-delay: .12s; }
  .t-card:nth-child(3) { animation-delay: .19s; }
  .t-card:nth-child(4) { animation-delay: .26s; }
  .t-card:nth-child(5) { animation-delay: .33s; }

  /* Card top */
  .t-card-top { display: flex; align-items: center; gap: 12px; }
  .t-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--navy); overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .t-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .t-avatar-initials {
    color: var(--sand); font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 400;
  }
  .t-author { flex: 1; min-width: 0; }
  .t-author-name {
    font-size: 14px; font-weight: 600; color: var(--navy);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .t-author-meta { font-size: 11px; color: var(--gray); font-weight: 300; margin-top: 2px; }

  /* Stars */
  .t-card-stars { display: flex; gap: 3px; }
  .t-card-star { font-size: 13px; color: var(--sand); }

  /* Quote */
  .t-quote {
    font-size: 14px; font-weight: 300; color: #444;
    line-height: 1.75; flex: 1; position: relative; padding-left: 16px;
  }
  .t-quote::before {
    content: '';
    position: absolute; left: 0; top: 4px; bottom: 4px;
    width: 2px; background: var(--pale); border-radius: 2px;
  }
  .t-read-more {
    background: none; border: none; color: var(--teal);
    font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; padding: 0; margin-top: 4px;
    text-decoration: underline; text-underline-offset: 3px;
  }

  /* ── "See all on Google" link ─────────────────────────── */
  .t-see-all {
    text-align: center; margin-top: 44px;
  }
  .t-see-all a {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px; border: 1.5px solid rgba(8,58,79,.15);
    border-radius: 40px; font-size: 12px; font-weight: 600;
    letter-spacing: 1px; color: var(--navy); text-decoration: none;
    transition: all .2s;
  }
  .t-see-all a:hover {
    background: var(--navy); color: #fff; border-color: var(--navy);
  }
  .t-see-all a svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<section class="t-section">

  <!-- Header -->
  <div class="t-header">
    <p class="t-eyebrow">Client Love</p>
    <h2 class="t-title">Words from our<br><em>happy clients</em></h2>

    <!-- Rating bar (updated by JS) -->
    <div class="t-rating-bar" id="ratingBar">
      <span class="t-stars">
        <span class="t-star">★</span><span class="t-star">★</span>
        <span class="t-star">★</span><span class="t-star">★</span>
        <span class="t-star">★</span>
      </span>
      <span class="t-score" id="ratingScore">5.0</span>
      <span class="t-count" id="ratingCount">13 reviews</span>
      <span class="t-google-badge">
        <!-- Google logo -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google Reviews
      </span>
    </div>
    <div class="t-rule"></div>
  </div>

  <!-- Loading state -->
  <div class="t-loading" id="loadingState">
    <div class="t-spinner"></div>
    Fetching latest reviews…
  </div>

  <!-- Cards grid (populated by JS) -->
  <div class="t-grid" id="reviewGrid" style="display:none;"></div>

  <!-- See all -->
  <div class="t-see-all" id="seeAll" style="display:none;">
    <a href="https://g.page/r/Ce9sq6kVm2xqEBM/review" target="_blank" rel="noopener">
      <!-- Arrow icon -->
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 8h10M9 4l4 4-4 4"/>
      </svg>
      See all reviews on Google
    </a>
  </div>

</section>

<script>
  // Fallback reviews (scraped from Google Maps — used if API not yet configured)
  const FALLBACK = [
    {
      author_name: "Vinh Dong",
      rating: 5,
      relative_time_desc: "3 weeks ago",
      text: "The photos were amazing! Johnny was so kind, patient, and friendly, and we received photos and videos that couldn't have been better. Highly recommend to anyone looking for a photographer or videographer!",
      profile_photo_url: ""
    },
    {
      author_name: "Hannah Pham",
      rating: 5,
      relative_time_desc: "4 weeks ago",
      text: "We couldn't be happier with our experience. Johnny was professional, unobtrusive, and captured our day beautifully. They kept everyone calm during busy moments and instinctively knew exactly where to be to catch the best memories. The final photos exceeded all expectations!",
      profile_photo_url: ""
    },
    {
      author_name: "Anna Marcus",
      rating: 5,
      relative_time_desc: "3 weeks ago",
      text: "Johnny captured our Autumn photos not too long ago. They turned out so beautifully! Johnny was really kind, patient, and welcoming, and made sure our experience made us leave with a smile on our faces. Will definitely be booking in the future for our photos! Thank you Johnny 🫰☺️",
      profile_photo_url: ""
    }
  ];

  function initials(name) {
    return name.split(" ").slice(0,2).map(w => w[0]).join("").toUpperCase();
  }

  function stars(n) {
    return Array(5).fill(0).map((_, i) =>
      `<span class="t-card-star">${i < n ? "★" : "☆"}</span>`
    ).join("");
  }

  const MAX_CHARS = 200;

  function renderCard(r) {
    const needsToggle = r.text.length > MAX_CHARS;
    const preview     = needsToggle ? r.text.slice(0, MAX_CHARS).trimEnd() + "…" : r.text;
    const id          = "q" + Math.random().toString(36).slice(2);

    return `
      <div class="t-card">
        <div class="t-card-top">
          <div class="t-avatar">
            ${r.profile_photo_url
              ? `<img src="${r.profile_photo_url}" alt="${r.author_name}" referrerpolicy="no-referrer"/>`
              : `<span class="t-avatar-initials">${initials(r.author_name)}</span>`}
          </div>
          <div class="t-author">
            <div class="t-author-name">${r.author_name}</div>
            <div class="t-author-meta">${r.relative_time_desc}</div>
          </div>
        </div>
        <div class="t-card-stars">${stars(r.rating)}</div>
        <p class="t-quote" id="${id}">${preview}</p>
        ${needsToggle ? `<button class="t-read-more" onclick="toggleQuote('${id}', ${JSON.stringify(r.text)}, ${JSON.stringify(preview)}, this)">Read more</button>` : ""}
      </div>`;
  }

  function toggleQuote(id, full, preview, btn) {
    const el = document.getElementById(id);
    if (btn.textContent === "Read more") {
      el.textContent = full;
      btn.textContent = "Read less";
    } else {
      el.textContent = preview;
      btn.textContent = "Read more";
    }
  }

  function render(reviews, rating, total) {
    document.getElementById("ratingScore").textContent = rating.toFixed(1);
    document.getElementById("ratingCount").textContent = total + " reviews";
    const grid = document.getElementById("reviewGrid");
    grid.innerHTML = reviews.map(renderCard).join("");
    document.getElementById("loadingState").style.display = "none";
    grid.style.display = "grid";
    document.getElementById("seeAll").style.display = "block";
  }

  // Try live API first, fall back to scraped data
  fetch("/api/reviews")
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(d => render(d.reviews, d.rating, d.totalReviews))
    .catch(() => render(FALLBACK, 5.0, 13));
</script>
</body>
</html>
